<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background with Zamtel gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A651;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E91E8C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" rx="32" fill="url(#grad1)"/>
  
  <!-- Signal Icon (Zamtel representation) -->
  <g transform="translate(96, 96)">
    <!-- Signal bars -->
    <rect x="-50" y="20" width="18" height="25" fill="white" rx="3"/>
    <rect x="-25" y="5" width="18" height="40" fill="white" rx="3"/>
    <rect x="0" y="-10" width="18" height="55" fill="white" rx="3"/>
    <rect x="25" y="-25" width="18" height="70" fill="white" rx="3"/>
  </g>
  
  <!-- Location pin overlay -->
  <g transform="translate(145, 145)">
    <circle cx="0" cy="0" r="22" fill="#E91E8C"/>
    <path d="M 0,-12 c -4.4,0 -8,3.6 -8,8 c 0,6 8,12 8,12 s 8,-6 8,-12 c 0,-4.4 -3.6,-8 -8,-8 z" fill="white"/>
    <circle cx="0" cy="-4" r="3" fill="#E91E8C"/>
  </g>
  
  <!-- Slogan arc text (simplified) -->
  <text x="96" y="170" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-style="italic" opacity="0.9">Create your World</text>
</svg>
